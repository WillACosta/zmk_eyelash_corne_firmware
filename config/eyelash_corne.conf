# === Power ===
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# === Bluetooth ===
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# CONFIG_BT_CTLR_PHY_2M=n
# CONFIG_ZMK_BLE_KEYBOARD_REPORT_QUEUE_SIZE=32
# CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# === Performance ===
CONFIG_ZMK_KSCAN_EVENT_QUEUE_SIZE=8
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

# === HID ===
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
# CONFIG_ZMK_HID_INDICATORS=y
# CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# === Pointing devices or behaviors ===
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# === Rotatory Encoders ===
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# === Displays ===
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=20

CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_14=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_18=y

CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# === Split ===
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# === LED Strip ===
CONFIG_LED_STRIP=y
CONFIG_SPI=y

# === RGB Under Glow ===
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
# CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# === RGB LED status widget ===
CONFIG_WS2812_STRIP=y
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_WS2812=y

CONFIG_RGBLED_WIDGET_LED_COUNT=3
CONFIG_RGBLED_WIDGET_SPATIAL_MAPPING=y
CONFIG_RGBLED_WIDGET_ANIMATIONS=y
CONFIG_RGBLED_WIDGET_LED_SHARING=y

CONFIG_RGBLED_WIDGET_BATTERY_LED_INDEX=0
CONFIG_RGBLED_WIDGET_CONN_LED_INDEX=1
CONFIG_RGBLED_WIDGET_LAYER_LED_INDEX=2
CONFIG_RGBLED_WIDGET_SHOW_CAPSLOCK=n

CONFIG_RGBLED_WIDGET_SHARE_TIMEOUT_MS=800
CONFIG_RGBLED_WIDGET_BRIGHTNESS=128

CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=7

CONFIG_RGBLED_WIDGET_CONN_SHOW_USB=y
CONFIG_RGBLED_WIDGET_LAYER_SHARE_BATTERY=y
CONFIG_RGBLED_WIDGET_LAYER_SHARE_CONN=y

# CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=50
# CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

# === Development ===
CONFIG_ZMK_STUDIO=n

# === Prospector Scanner ===
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="Corne Kbd"
CONFIG_ZMK_STATUS_ADV_CENTRAL_SIDE="LEFT"
CONFIG_PROSPECTOR_EXPECTED_PERIPHERAL_COUNT=1

# === Heatmap Generator ===
CONFIG_ZMK_HEATMAP=y



