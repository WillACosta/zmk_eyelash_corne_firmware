# Go to sleep after one hour (1*60*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

CONFIG_ZMK_SLEEP=y

CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# Uncomment the following line to enable NKRO
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Some operating systems have problems with full support for consumer keycodes.
# Uncomment the following line if keycodes labeled "consumer" like C_AC_SEARCH don't work
#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Enable EC11
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Mouse enable
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Uncomment the following line to increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

# Soft off
CONFIG_ZMK_PM_SOFT_OFF=y

# Config for displays
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_26=y

CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Report battery status for both halves
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ===== Prospector Scanner (v2.2.1) =====
# https://github.com/t-ogura/zmk-config-prospector
#
# Enables BLE Advertisement broadcasting so the Prospector Scanner device
# can display keyboard status (battery, layer, modifiers, WPM) in real-time
# without consuming a BLE connection slot.

# Required: enable status advertisement
CONFIG_ZMK_STATUS_ADVERTISEMENT=y

# Keyboard name shown on the scanner display (max 8 chars)
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="Eyelash Corne"

# Split keyboard: LEFT half has USB → LEFT is central
CONFIG_ZMK_STATUS_ADV_CENTRAL_SIDE="LEFT"

# v2.2.1 cold-boot fix: number of peripherals central must connect to before
# switching from burst/silent cycle. For a standard 2-half split this is 1.
CONFIG_PROSPECTOR_EXPECTED_PERIPHERAL_COUNT=1

# WPM tracking window (seconds). Default 30s gives a good balance between
# responsiveness and stability. Range: 5–120.
CONFIG_ZMK_STATUS_ADV_WPM_WINDOW_SECONDS=30

# Activity-based advertisement intervals (all defaults are already sensible):
# Active (typing) → 1 Hz update, Idle → 30 s update, timeout after 5 s idle.
# Uncomment to tune:
# CONFIG_ZMK_STATUS_ADV_ACTIVE_INTERVAL_MS=1000
# CONFIG_ZMK_STATUS_ADV_IDLE_INTERVAL_MS=30000
# CONFIG_ZMK_STATUS_ADV_ACTIVITY_TIMEOUT_MS=5000